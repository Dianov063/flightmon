<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flight Monitor</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,400&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,600;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet">
<style>
:root {
  --bg:       #f5f3ef;
  --bg2:      #ede9e3;
  --surf:     #ffffff;
  --surf2:    #faf9f7;
  --border:   #e2ddd6;
  --border2:  #ccc8c0;
  --text:     #1a1814;
  --text2:    #5c5650;
  --muted:    #9e9890;
  --accent:   #1a6ef5;
  --accent2:  #e85d2f;
  --green:    #1a8a4a;
  --green-bg: #e8f5ee;
  --green-br: #a8d4b8;
  --yellow:   #b37a00;
  --yellow-bg:#fef6e0;
  --yellow-br:#e8c870;
  --blue-bg:  #e8f0fe;
  --blue-br:  #a8c0f0;
  --red:      #c8302a;
  --shadow:   0 1px 3px rgba(0,0,0,.06), 0 4px 16px rgba(0,0,0,.04);
  --shadow-lg:0 4px 24px rgba(0,0,0,.10);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  min-height: 100vh;
  font-size: 14px;
}
body::before {
  content: '';
  position: fixed; inset: 0;
  background-image: radial-gradient(circle, #c8c4bc 1px, transparent 1px);
  background-size: 28px 28px;
  opacity: .35;
  pointer-events: none;
  z-index: 0;
}
.wrap { position: relative; z-index: 1; max-width: 1240px; margin: 0 auto; padding: 32px 28px 60px; }

header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 36px; padding-bottom: 24px; border-bottom: 2px solid var(--border); }
.logo { display: flex; align-items: baseline; gap: 10px; }
.logo-mark { font-family: 'DM Mono', monospace; font-size: 22px; font-weight: 500; letter-spacing: -1px; }
.logo-mark em { color: var(--accent); font-style: normal; }
.logo-sub { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--muted); letter-spacing: 3px; text-transform: uppercase; border-left: 1px solid var(--border2); padding-left: 10px; }
.header-right { display: flex; align-items: center; gap: 20px; }
.live-pill { display: flex; align-items: center; gap: 7px; background: var(--green-bg); border: 1px solid var(--green-br); border-radius: 20px; padding: 5px 14px; font-family: 'DM Mono', monospace; font-size: 10px; font-weight: 500; color: var(--green); letter-spacing: 1.5px; text-transform: uppercase; }
.live-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); animation: livepulse 2s ease-in-out infinite; }
@keyframes livepulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.4;transform:scale(.7)} }
.next-badge { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--muted); }
.next-badge span { color: var(--accent); font-weight: 500; }

.layout { display: grid; grid-template-columns: 300px 1fr; gap: 24px; align-items: start; }
@media(max-width:960px){ .layout { grid-template-columns: 1fr; } }
.sidebar { display: flex; flex-direction: column; gap: 16px; }

.card { background: var(--surf); border: 1px solid var(--border); border-radius: 12px; box-shadow: var(--shadow); overflow: hidden; }
.card-head { display: flex; align-items: center; justify-content: space-between; padding: 14px 18px; background: var(--surf2); border-bottom: 1px solid var(--border); }
.card-title { font-family: 'DM Mono', monospace; font-size: 10px; font-weight: 500; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); }
.card-badge { font-family: 'DM Mono', monospace; font-size: 10px; background: var(--green-bg); color: var(--green); border: 1px solid var(--green-br); border-radius: 10px; padding: 2px 9px; font-weight: 500; }

.ac-item { display: flex; align-items: center; gap: 12px; padding: 13px 18px; border-bottom: 1px solid var(--border); cursor: pointer; transition: background .12s; }
.ac-item:last-child { border-bottom: none; }
.ac-item:hover { background: var(--bg2); }
.ac-item.sel { background: var(--blue-bg); border-left: 3px solid var(--accent); }
.ac-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.ac-dot.on  { background: var(--green); box-shadow: 0 0 0 3px var(--green-bg); }
.ac-dot.off { background: var(--muted); }
.ac-body { flex: 1; min-width: 0; }
.ac-callsign { font-family: 'DM Mono', monospace; font-size: 13px; font-weight: 500; }
.ac-meta { font-size: 11px; color: var(--muted); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.ac-right { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; }
.ac-flights { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--muted); }
.ac-btns { display: flex; gap: 4px; opacity: 0; transition: opacity .15s; }
.ac-item:hover .ac-btns { opacity: 1; }
.mini-btn { width: 24px; height: 24px; border-radius: 5px; border: 1px solid var(--border2); background: var(--surf); color: var(--muted); cursor: pointer; font-size: 10px; display: flex; align-items: center; justify-content: center; transition: all .15s; }
.mini-btn:hover.mb-run   { border-color: var(--accent); color: var(--accent); background: var(--blue-bg); }
.mini-btn:hover.mb-pause { border-color: var(--yellow); color: var(--yellow); background: var(--yellow-bg); }
.mini-btn:hover.mb-del   { border-color: var(--red); color: var(--red); }

.add-form { padding: 18px; display: flex; flex-direction: column; gap: 10px; }
label { font-size: 11px; font-weight: 600; color: var(--text2); letter-spacing: .3px; display: block; margin-bottom: 5px; }
input[type=text] { width: 100%; font-family: 'DM Mono', monospace; font-size: 12px; padding: 9px 12px; background: var(--surf2); border: 1px solid var(--border2); border-radius: 7px; color: var(--text); transition: border-color .15s, box-shadow .15s; }
input[type=text]:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(26,110,245,.1); }
input[type=text]::placeholder { color: var(--muted); }
.row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }

.btn { font-family: 'DM Mono', monospace; font-size: 11px; font-weight: 500; letter-spacing: .5px; padding: 9px 16px; border-radius: 7px; border: 1px solid var(--border2); background: var(--surf2); color: var(--text2); cursor: pointer; transition: all .15s; white-space: nowrap; }
.btn:hover { border-color: var(--accent); color: var(--accent); background: var(--blue-bg); }
.btn.primary { background: var(--accent); color: #fff; border-color: var(--accent); box-shadow: 0 2px 8px rgba(26,110,245,.25); }
.btn.primary:hover { background: #155ae0; border-color: #155ae0; }
.btn.sm { padding: 5px 10px; font-size: 10px; }

.log-body { padding: 12px 18px; max-height: 160px; overflow-y: auto; font-family: 'DM Mono', monospace; font-size: 10.5px; line-height: 1.9; background: var(--surf2); }
.log-body::-webkit-scrollbar { width: 3px; }
.log-body::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }
.lg { color: var(--muted); }
.lg .ts { color: var(--accent); margin-right: 8px; }
.ok   { color: var(--green)  !important; }
.warn { color: var(--yellow) !important; }
.info { color: var(--text2)  !important; }
.err2 { color: var(--red)    !important; }

.main { display: flex; flex-direction: column; gap: 18px; }
.stats { display: grid; grid-template-columns: repeat(4,1fr); gap: 12px; }
@media(max-width:700px){ .stats { grid-template-columns: repeat(2,1fr); } }
.stat { background: var(--surf); border: 1px solid var(--border); border-radius: 10px; padding: 18px 20px; box-shadow: var(--shadow); position: relative; overflow: hidden; }
.stat-accent { position: absolute; bottom: 0; left: 0; right: 0; height: 3px; background: var(--accent); }
.stat:nth-child(2) .stat-accent { background: var(--accent2); }
.stat:nth-child(3) .stat-accent { background: var(--green); }
.stat:nth-child(4) .stat-accent { background: var(--yellow); }
.stat-label { font-family: 'DM Mono', monospace; font-size: 9px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); margin-bottom: 10px; }
.stat-val { font-size: 2rem; font-weight: 700; line-height: 1; color: var(--text); }
.stat-val.sm { font-size: 1.05rem; line-height: 1.4; }

.filter-bar { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
.tabs { display: flex; gap: 4px; }
.tab { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 1px; text-transform: uppercase; padding: 7px 14px; border-radius: 6px; border: 1px solid var(--border2); background: var(--surf); color: var(--muted); cursor: pointer; transition: all .12s; }
.tab:hover,.tab.active { background: var(--blue-bg); border-color: var(--accent); color: var(--accent); }

.table-wrap { background: var(--surf); border: 1px solid var(--border); border-radius: 12px; box-shadow: var(--shadow); overflow: hidden; }
.table-head { display: grid; grid-template-columns: 110px 170px 145px 145px 95px 70px 90px; padding: 11px 22px; background: var(--surf2); border-bottom: 1px solid var(--border); }
.th { font-family: 'DM Mono', monospace; font-size: 9px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); font-weight: 500; }
.t-row { display: grid; grid-template-columns: 110px 170px 145px 145px 95px 70px 90px; padding: 13px 22px; border-bottom: 1px solid var(--border); transition: background .1s; animation: rowIn .2s ease both; }
.t-row:last-child { border-bottom: none; }
.t-row:hover { background: var(--bg2); }
@keyframes rowIn { from{opacity:0;transform:translateY(3px)} to{opacity:1;transform:none} }
.cell { font-family: 'DM Mono', monospace; font-size: 11px; display: flex; flex-direction: column; justify-content: center; }
.cs-pill { display: inline-block; font-size: 10px; font-weight: 500; padding: 3px 8px; border-radius: 5px; background: var(--blue-bg); color: var(--accent); border: 1px solid var(--blue-br); letter-spacing: .5px; }
.iata { font-size: 14px; font-weight: 600; letter-spacing: .5px; }
.iata.from { color: var(--accent); }
.iata.to   { color: var(--accent2); }
.city-sub  { font-size: 10px; color: var(--muted); margin-top: 1px; }
.badge { display: inline-flex; align-items: center; gap: 5px; font-size: 9px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; padding: 3px 9px; border-radius: 4px; border: 1px solid; }
.b-landed { color: var(--green);  background: var(--green-bg);  border-color: var(--green-br); }
.b-active  { color: var(--accent); background: var(--blue-bg);   border-color: var(--blue-br); animation: ablink 2s ease infinite; }
@keyframes ablink { 0%,100%{opacity:1} 50%{opacity:.6} }
.b-unknown { color: var(--muted);  background: var(--bg2);       border-color: var(--border2); }
.dur-val { color: var(--yellow); font-weight: 500; }
.ac-val  { color: var(--text2); }
.empty-state { padding: 72px 24px; text-align: center; color: var(--muted); font-family: 'DM Mono', monospace; font-size: 12px; line-height: 2.4; }
.empty-state strong { display: block; font-size: 28px; margin-bottom: 12px; color: var(--border2); }

.toast { position: fixed; bottom: 28px; right: 28px; background: var(--surf); border: 1px solid var(--border2); border-radius: 10px; padding: 12px 20px; font-family: 'DM Mono', monospace; font-size: 12px; box-shadow: var(--shadow-lg); transform: translateY(70px); opacity: 0; transition: all .28s cubic-bezier(.4,0,.2,1); z-index: 999; }
.toast.show { transform: none; opacity: 1; }
.toast.tok  { border-color: var(--green-br); color: var(--green); }
.toast.terr { border-color: #f0b0b0; color: var(--red); }

@media(max-width:800px){
  .table-head,.t-row { grid-template-columns: 100px 150px 120px 95px; }
  .cell:nth-child(n+5) { display: none; }
}
</style>
</head>
<body>
<div class="wrap">

<header>
  <div class="logo">
    <div class="logo-mark">FLIGHT<em>MON</em></div>
    <div class="logo-sub">v2.0</div>
  </div>
  <div class="header-right">
    <div class="next-badge">следующая проверка: <span id="s-next">—</span></div>
    <div class="live-pill"><div class="live-dot"></div>Monitoring</div>
  </div>
</header>

<div class="layout">
  <div class="sidebar">

    <div class="card">
      <div class="card-head">
        <span class="card-title">Самолёты</span>
        <span class="card-badge" id="ac-badge">0 активных</span>
      </div>
      <div id="aircraft-list"></div>
    </div>

    <div class="card">
      <div class="card-head"><span class="card-title">Добавить самолёт</span></div>
      <div class="add-form">
        <div>
          <label>Позывной *</label>
          <input type="text" id="inp-cs" placeholder="SVR123" maxlength="12">
        </div>
        <div>
          <label>Авиакомпания / название</label>
          <input type="text" id="inp-lbl" placeholder="Solaris Aero">
        </div>
        <div class="row2">
          <div>
            <label>Бортовой №</label>
            <input type="text" id="inp-reg" placeholder="RA-67677">
          </div>
          <div style="display:flex;align-items:flex-end">
            <button class="btn primary" style="width:100%" onclick="addAircraft()">+ Добавить</button>
          </div>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-head">
        <span class="card-title">Системный лог</span>
        <button class="btn sm" onclick="clearLog()">очистить</button>
      </div>
      <div class="log-body" id="log"></div>
    </div>

  </div>

  <div class="main">

    <div class="stats">
      <div class="stat"><div class="stat-label">Рейсов в БД</div><div class="stat-val" id="s-total">—</div><div class="stat-accent"></div></div>
      <div class="stat"><div class="stat-label">Последний рейс</div><div class="stat-val sm" id="s-last">—</div><div class="stat-accent"></div></div>
      <div class="stat"><div class="stat-label">Маршрутов</div><div class="stat-val" id="s-routes">—</div><div class="stat-accent"></div></div>
      <div class="stat"><div class="stat-label">Самолётов активно</div><div class="stat-val" id="s-active">—</div><div class="stat-accent"></div></div>
    </div>

    <div class="filter-bar">
      <input type="text" id="f-search" placeholder="🔍  Поиск: DWC, Moscow, BHK..." oninput="renderTable()" style="flex:1;min-width:160px;max-width:280px">
      <div class="tabs">
        <button class="tab active" onclick="setFilter('all',this)">Все</button>
        <button class="tab" onclick="setFilter('landed',this)">Landed</button>
        <button class="tab" onclick="setFilter('active',this)">Active</button>
        <button class="tab" onclick="setFilter('unknown',this)">Unknown</button>
      </div>
      <button class="btn primary" style="margin-left:auto" onclick="fetchAll()">▶ Проверить сейчас</button>
    </div>

    <div class="table-wrap">
      <div class="table-head">
        <div class="th">Позывной</div>
        <div class="th">Вылет UTC</div>
        <div class="th">Откуда</div>
        <div class="th">Куда</div>
        <div class="th">Статус</div>
        <div class="th">Длит.</div>
        <div class="th">Борт</div>
      </div>
      <div id="flight-table"></div>
    </div>

  </div>
</div>
</div>

<div class="toast" id="toast"></div>

<script>
const S = { aircraft:[], flights:[], filterStatus:'all', selectedAc:null, nextSec:600 };

async function apiGet(url) {
  const r = await fetch(url); if (!r.ok) throw new Error('HTTP '+r.status); return r.json();
}
async function apiPost(url, body) {
  const r = await fetch(url,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
  if (!r.ok) throw new Error('HTTP '+r.status); return r.json();
}
async function apiDelete(url) {
  const r = await fetch(url,{method:'DELETE'}); if (!r.ok) throw new Error('HTTP '+r.status); return r.json();
}

async function loadAll() {
  try {
    const [aircraft, flights] = await Promise.all([apiGet('/api/aircraft'), apiGet('/api/flights?limit=200')]);
    S.aircraft = aircraft.map(a=>({callsign:a.callsign,label:a.label||'',reg:a.registration||'',active:!!a.active}));
    S.flights  = flights.map(f=>({callsign:f.callsign,dep:f.departure_utc,arr:f.arrival_utc,from:f.from_iata,fromCity:f.from_city,to:f.to_iata,toCity:f.to_city,status:f.status,dur:f.duration_min,ac:f.aircraft_type}));
    render();
    log('ok', `Загружено: ${S.flights.length} рейсов, ${S.aircraft.length} самолётов`);
  } catch(e) { log('err2','Ошибка загрузки: '+e.message); }
}

async function addAircraft() {
  const cs=document.getElementById('inp-cs').value.trim().toUpperCase();
  const lbl=document.getElementById('inp-lbl').value.trim();
  const reg=document.getElementById('inp-reg').value.trim().toUpperCase();
  if (!cs){toast('Введи позывной!','terr');return;}
  try {
    await apiPost('/api/aircraft',{callsign:cs,label:lbl,registration:reg});
    ['inp-cs','inp-lbl','inp-reg'].forEach(id=>document.getElementById(id).value='');
    toast('✓ '+cs+' добавлен','tok');
    log('ok','Добавлен: '+cs+(lbl?' ('+lbl+')':''));
    setTimeout(loadAll,3000);
  } catch(e){toast('Ошибка: '+e.message,'terr');}
}

async function deleteAc(cs,e) {
  e&&e.stopPropagation();
  if(!confirm('Остановить мониторинг '+cs+'?\nИстория рейсов останется в БД.'))return;
  try {
    await apiDelete('/api/aircraft/'+cs);
    toast('⏸ '+cs+' на паузе','terr');
    log('warn',cs+': мониторинг остановлен');
    await loadAll();
  } catch(e){toast('Ошибка: '+e.message,'terr');}
}

function selectAc(cs){S.selectedAc=S.selectedAc===cs?null:cs;render();}

async function fetchNow(cs) {
  try {
    await apiPost('/api/fetch',cs?{callsign:cs}:{});
    toast('▶ Проверка '+(cs||'всех')+' запущена','tok');
    log('info','→ Запрос к FR24 ['+(cs||'все')+']');
    setTimeout(loadAll,5000);
  } catch(e){toast('Ошибка: '+e.message,'terr');}
}
function fetchAll(){fetchNow(S.selectedAc);}

let filterStatus='all';
function setFilter(f,btn){
  filterStatus=f;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active');renderTable();
}

function render(){renderAcList();renderTable();updateStats();}

function renderAcList(){
  const active=S.aircraft.filter(a=>a.active).length;
  document.getElementById('ac-badge').textContent=active+' активных';
  const el=document.getElementById('aircraft-list');
  if(!S.aircraft.length){el.innerHTML='<div style="padding:20px;text-align:center;color:var(--muted);font-family:\'DM Mono\',monospace;font-size:11px">Нет самолётов</div>';return;}
  el.innerHTML=S.aircraft.map(ac=>{
    const cnt=S.flights.filter(f=>f.callsign===ac.callsign).length;
    const sel=S.selectedAc===ac.callsign;
    return '<div class="ac-item'+(sel?' sel':'')+'" onclick="selectAc(\''+ac.callsign+'\')">'+
      '<div class="ac-dot '+(ac.active?'on':'off')+'"></div>'+
      '<div class="ac-body">'+
        '<div class="ac-callsign">'+ac.callsign+'</div>'+
        '<div class="ac-meta">'+(ac.label||'—')+(ac.reg?' · '+ac.reg:'')+'</div>'+
      '</div>'+
      '<div class="ac-right">'+
        '<div class="ac-flights">'+cnt+' рейсов</div>'+
        '<div class="ac-btns">'+
          '<button class="mini-btn mb-run" title="Проверить сейчас" onclick="fetchNow(\''+ac.callsign+'\');event.stopPropagation()">▶</button>'+
          '<button class="mini-btn mb-del" title="Остановить" onclick="deleteAc(\''+ac.callsign+'\',event)">✕</button>'+
        '</div>'+
      '</div>'+
    '</div>';
  }).join('');
}

function renderTable(){
  const q=document.getElementById('f-search').value.toLowerCase();
  let data=[...S.flights];
  if(S.selectedAc) data=data.filter(f=>f.callsign===S.selectedAc);
  if(filterStatus!=='all') data=data.filter(f=>f.status===filterStatus);
  if(q) data=data.filter(f=>(f.from+f.fromCity+f.to+f.toCity+f.callsign).toLowerCase().includes(q));
  data.sort((a,b)=>(b.dep||'').localeCompare(a.dep||''));
  const el=document.getElementById('flight-table');
  if(!data.length){el.innerHTML='<div class="empty-state"><strong>✈</strong>Нет данных<br>Добавь самолёт и нажми «Проверить сейчас»</div>';return;}
  el.innerHTML=data.map((f,i)=>{
    const badge=f.status==='landed'?'<span class="badge b-landed">● Landed</span>':f.status==='active'?'<span class="badge b-active">● Active</span>':'<span class="badge b-unknown">Unknown</span>';
    const dur=f.dur?Math.floor(f.dur/60)+'ч '+(f.dur%60).toString().padStart(2,'0')+'м':'—';
    const from='<span class="iata from">'+(f.from||'?')+'</span>'+(f.fromCity?'<span class="city-sub">'+f.fromCity+'</span>':'');
    const to='<span class="iata to">'+(f.to||'?')+'</span>'+(f.toCity?'<span class="city-sub">'+f.toCity+'</span>':'');
    return '<div class="t-row" style="animation-delay:'+i*.03+'s">'+
      '<div class="cell"><span class="cs-pill">'+f.callsign+'</span></div>'+
      '<div class="cell">'+(f.dep||'—')+'</div>'+
      '<div class="cell">'+from+'</div>'+
      '<div class="cell">'+to+'</div>'+
      '<div class="cell">'+badge+'</div>'+
      '<div class="cell"><span class="dur-val">'+dur+'</span></div>'+
      '<div class="cell"><span class="ac-val">'+(f.ac||'—')+'</span></div>'+
    '</div>';
  }).join('');
}

function updateStats(){
  document.getElementById('s-total').textContent=S.flights.length;
  document.getElementById('s-routes').textContent=new Set(S.flights.map(f=>f.from+f.to)).size;
  document.getElementById('s-active').textContent=S.aircraft.filter(a=>a.active).length;
  const last=[...S.flights].sort((a,b)=>(b.dep||'').localeCompare(a.dep||''))[0];
  document.getElementById('s-last').textContent=last?last.from+' → '+(last.to||'?'):'—';
}

let logLines=[];
function log(type,msg){
  const ts=new Date().toISOString().slice(11,19);
  logLines.unshift({ts,type,msg});if(logLines.length>60)logLines.pop();
  document.getElementById('log').innerHTML=logLines.map(l=>'<div class="lg"><span class="ts">['+l.ts+']</span><span class="'+l.type+'">'+l.msg+'</span></div>').join('');
}
function clearLog(){logLines=[];document.getElementById('log').innerHTML='';}

let toastT;
function toast(msg,type='tok'){
  const el=document.getElementById('toast');
  el.textContent=msg;el.className='toast show '+type;
  clearTimeout(toastT);toastT=setTimeout(()=>el.classList.remove('show'),3000);
}

setInterval(()=>{
  S.nextSec--;
  if(S.nextSec<=0){S.nextSec=600;loadAll();}
  const m=Math.floor(S.nextSec/60),s=S.nextSec%60;
  document.getElementById('s-next').textContent=m+':'+s.toString().padStart(2,'0');
},1000);

log('info','Подключение к серверу...');
loadAll();
</script>
</body>
</html>
